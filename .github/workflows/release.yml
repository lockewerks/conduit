name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  BINARY_NAME: conduit
  APP_DISPLAY_NAME: Conduit
  APP_ID: com.lockewerks.conduit

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: Conduit-linux-x64
            archive_ext: AppImage

          - os: macos-14
            artifact_name: Conduit-macos-arm64
            archive_ext: dmg

          - os: windows-latest
            artifact_name: Conduit-windows-x64
            archive_ext: zip

    runs-on: ${{ matrix.os }}
    name: Build — ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---- Install platform dependencies ----

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libsdl2-dev \
            libcurl4-openssl-dev \
            libsqlite3-dev \
            libgl-dev \
            libgif-dev \
            libwebsockets-dev \
            nlohmann-json3-dev \
            libfuse2

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install \
            cmake \
            ninja \
            sdl2 \
            curl \
            sqlite3 \
            giflib \
            libwebsockets \
            nlohmann-json \
            create-dmg

      - name: Setup vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'a42af01b72c28a8e1d7b48107b33e4f286a55ef6'

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install sdl2:x64-windows curl:x64-windows sqlite3:x64-windows giflib:x64-windows libwebsockets:x64-windows nlohmann-json:x64-windows
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows

      # ---- Configure CMake ----

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_INSTALL_PREFIX=install

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_INSTALL_PREFIX=install

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      # ---- Build ----

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      # ---- Package: Linux AppImage ----

      - name: Package AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/applications

          cp build/${{ env.BINARY_NAME }} AppDir/usr/bin/
          [ -d assets ] && cp -r assets AppDir/usr/bin/ || true

          cat > AppDir/${{ env.APP_ID }}.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=${{ env.APP_DISPLAY_NAME }}
          Exec=${{ env.BINARY_NAME }}
          Icon=${{ env.APP_ID }}
          Categories=Network;Chat;
          Comment=Terminal-styled Slack client
          EOF
          # strip leading whitespace from heredoc
          sed -i 's/^          //' AppDir/${{ env.APP_ID }}.desktop

          cp AppDir/${{ env.APP_ID }}.desktop AppDir/usr/share/applications/

          if [ -f assets/icons/conduit.png ]; then
            cp assets/icons/conduit.png AppDir/usr/share/icons/hicolor/256x256/apps/${{ env.APP_ID }}.png
          else
            convert -size 256x256 xc:'#1a1a2e' AppDir/usr/share/icons/hicolor/256x256/apps/${{ env.APP_ID }}.png 2>/dev/null || \
            python3 -c "
          from PIL import Image
          img = Image.new('RGBA', (256, 256), (26, 26, 46, 255))
          img.save('AppDir/usr/share/icons/hicolor/256x256/apps/${{ env.APP_ID }}.png')
          " 2>/dev/null || \
            touch AppDir/usr/share/icons/hicolor/256x256/apps/${{ env.APP_ID }}.png
          fi
          cp "AppDir/usr/share/icons/hicolor/256x256/apps/${{ env.APP_ID }}.png" \
             "AppDir/${{ env.APP_ID }}.png"

          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage

          OUTPUT="${{ matrix.artifact_name }}.AppImage" \
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/${{ env.APP_ID }}.desktop \
            --icon-file "AppDir/${{ env.APP_ID }}.png" \
            --output appimage

      # ---- Package: macOS DMG ----

      - name: Package DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          APP="${{ env.APP_DISPLAY_NAME }}.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          mkdir -p "$APP/Contents/Frameworks"

          cp build/${{ env.BINARY_NAME }} "$APP/Contents/MacOS/"
          [ -d assets ] && cp -r assets "$APP/Contents/Resources/" || true

          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-0.0.0}"
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>${{ env.APP_DISPLAY_NAME }}</string>
            <key>CFBundleDisplayName</key>
            <string>${{ env.APP_DISPLAY_NAME }}</string>
            <key>CFBundleIdentifier</key>
            <string>${{ env.APP_ID }}</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>${{ env.BINARY_NAME }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
          </dict>
          </plist>
          PLIST
          sed -i '' 's/^          //' "$APP/Contents/Info.plist"

          if [ -f assets/icon.icns ]; then
            cp assets/icon.icns "$APP/Contents/Resources/AppIcon.icns"
            /usr/libexec/PlistBuddy -c \
              "Add :CFBundleIconFile string AppIcon" \
              "$APP/Contents/Info.plist"
          fi

          for dylib in $(otool -L "$APP/Contents/MacOS/${{ env.BINARY_NAME }}" | \
                         grep -E '/usr/local|/opt/homebrew' | awk '{print $1}'); do
            cp "$dylib" "$APP/Contents/Frameworks/"
            dylib_name=$(basename "$dylib")
            install_name_tool -change "$dylib" \
              "@executable_path/../Frameworks/$dylib_name" \
              "$APP/Contents/MacOS/${{ env.BINARY_NAME }}"
            install_name_tool -id \
              "@executable_path/../Frameworks/$dylib_name" \
              "$APP/Contents/Frameworks/$dylib_name"
          done

          create-dmg \
            --volname "${{ env.APP_DISPLAY_NAME }}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "${{ env.APP_DISPLAY_NAME }}.app" 150 190 \
            --app-drop-link 450 190 \
            --hide-extension "${{ env.APP_DISPLAY_NAME }}.app" \
            --no-internet-enable \
            "${{ matrix.artifact_name }}.dmg" \
            "$APP" \
          || {
            echo "create-dmg failed, falling back to hdiutil"
            hdiutil create \
              -volname "${{ env.APP_DISPLAY_NAME }}" \
              -srcfolder "$APP" \
              -ov -format UDZO \
              "${{ matrix.artifact_name }}.dmg"
          }

      # ---- Package: Windows ZIP ----

      - name: Package ZIP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "build/${{ env.BUILD_TYPE }}/${{ env.BINARY_NAME }}.exe" dist/
          Get-ChildItem "build/${{ env.BUILD_TYPE }}/*.dll" -ErrorAction SilentlyContinue |
            Copy-Item -Destination dist/
          if (Test-Path assets) { Copy-Item -Recurse assets dist/ }
          if (Test-Path README.md) { Copy-Item README.md dist/ }
          if (Test-Path LICENSE) { Copy-Item LICENSE dist/ }
          Compress-Archive -Path dist/* -DestinationPath "${{ matrix.artifact_name }}.zip"

      # ---- Upload artifact ----

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}

  # ---- Create GitHub Release ----

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
